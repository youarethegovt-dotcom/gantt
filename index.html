<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESa Schedule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'DM Sans', -apple-system, sans-serif; background: #0f1117; color: #e8eaed; }
      #login-screen {
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
      }
      #login-box {
        background: #1a1d27; border: 1px solid #2e3340; border-radius: 12px;
        padding: 40px 36px; width: 360px;
      }
      #login-title {
        font-size: 22px; font-weight: 700; letter-spacing: -0.3px; text-align: center;
        background: linear-gradient(135deg, #8b5cf6, #d946ef);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        margin-bottom: 4px;
      }
      #login-sub { color: #8b8fa3; font-size: 13px; text-align: center; margin-bottom: 28px; }
      .login-label {
        display: block; color: #8b8fa3; font-size: 12px; margin-bottom: 6px;
        text-transform: uppercase; letter-spacing: 0.5px;
      }
      .login-input {
        width: 100%; padding: 10px 12px; background: #232733;
        border: 1px solid #2e3340; border-radius: 8px; color: #e8eaed;
        font-size: 14px; outline: none; font-family: inherit; margin-bottom: 14px;
      }
      .login-input:focus { border-color: #8b5cf6; }
      #login-error { color: #ef4444; font-size: 13px; text-align: center; margin-bottom: 14px; display: none; }
      #login-btn {
        width: 100%; padding: 11px; background: linear-gradient(135deg, #8b5cf6, #d946ef);
        border: none; border-radius: 8px; color: #fff; font-size: 14px;
        font-weight: 600; cursor: pointer; font-family: inherit;
      }
      #login-btn:disabled { opacity: 0.7; cursor: not-allowed; }
      #root { display: none; }
    </style>
  </head>
  <body>
    <div id="login-screen">
      <div id="login-box">
        <div id="login-title">ESa Schedule</div>
        <div id="login-sub">Sign in to continue</div>
        <label class="login-label">Email</label>
        <input class="login-input" type="email" id="email" autocomplete="email" />
        <label class="login-label">Password</label>
        <input class="login-input" type="password" id="password" autocomplete="current-password" />
        <div id="login-error">Invalid email or password.</div>
        <button id="login-btn" onclick="doLogin()">Sign In</button>
      </div>
    </div>

    <div id="root"></div>

    <script type="module">
      import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

      const SUPABASE_URL = 'https://cfyijoveheyznubkyool.supabase.co';
      const SUPABASE_KEY = 'sb_publishable_JW72QkTRQIi_oiMV_w2rKw_R6nA-F8D';

      const supabaseAuth = createClient(SUPABASE_URL, SUPABASE_KEY);

      // Check for existing session
      const { data: { session } } = await supabaseAuth.auth.getSession();
      if (session) showApp();

      window.doLogin = async function() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');
        const err = document.getElementById('login-error');

        btn.disabled = true;
        btn.textContent = 'Signing in…';
        err.style.display = 'none';

        const { error } = await supabaseAuth.auth.signInWithPassword({ email, password });

        if (error) {
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        } else {
          showApp();
        }
      };

      function showApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('root').style.display = 'block';
        // Dynamically load the app script after auth
        const script = document.createElement('script');
        script.type = 'module';
        script.crossOrigin = '';
        script.src = '/assets/index-C0s2WMiH.js';
        document.head.appendChild(script);
      }

      // Allow Enter key to submit
      document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') window.doLogin();
      });
    </script>
  </body>
</html>
